# Deploy 219 Jam Club to Azure App Service (single app: API + SPA in wwwroot)
# Set GitHub secrets: AZURE_WEBAPP_NAME (e.g. 219jamclub), AZURE_WEBAPP_PUBLISH_PROFILE (from App Service → Deployment Center → Manage publish profile)
name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  PUBLISH_OUTPUT: publish_output

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npx ng build --configuration=production

      - name: Copy SPA to backend wwwroot
        run: |
          SPA_DIR="frontend/dist/frontend/browser"
          if [ ! -d "$SPA_DIR" ]; then
            echo "ERROR: $SPA_DIR not found. Build output:"
            find frontend/dist -type f 2>/dev/null | head -30
            exit 1
          fi
          echo "Using SPA from: $SPA_DIR"
          mkdir -p backend/VenueApi/wwwroot
          cp -r "$SPA_DIR"/. backend/VenueApi/wwwroot/
          if [ -f backend/VenueApi/wwwroot/index.csr.html ]; then
            echo "Renaming index.csr.html to index.html (Angular SSR build)"
            mv backend/VenueApi/wwwroot/index.csr.html backend/VenueApi/wwwroot/index.html
          fi
          echo "wwwroot after copy:"
          ls -la backend/VenueApi/wwwroot/

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish backend
        run: |
          dotnet publish backend/VenueApi/VenueApi.csproj -c Release -o ${{ env.PUBLISH_OUTPUT }}

      - name: Ensure SPA in publish output
        run: |
          mkdir -p ${{ env.PUBLISH_OUTPUT }}/wwwroot
          cp -r backend/VenueApi/wwwroot/. ${{ env.PUBLISH_OUTPUT }}/wwwroot/
          echo "Publish output wwwroot:"
          ls -la ${{ env.PUBLISH_OUTPUT }}/wwwroot/
          test -f ${{ env.PUBLISH_OUTPUT }}/wwwroot/index.html || (echo "ERROR: index.html missing in deploy package" && exit 1)

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_OUTPUT }}
